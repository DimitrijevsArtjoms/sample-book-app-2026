name: Sample Book App Workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-install-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-install-deps
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/deploy
        with:
          environment: DEV
          port: 1010

  test-dev:
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v6
        with:
          repository: "DimitrijevsArtjoms/RTU-sample-API-automation-2026"
          clean: false
      - uses: ./.github/actions/test
        with:
          environment: DEV

  deploy-stg:
    runs-on: ubuntu-latest
    needs: test-dev
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/deploy
        with:
          environment: STG
          port: 2020
  test-stg:
    runs-on: ubuntu-latest
    needs: deploy-stg
    steps:
      - uses: actions/checkout@v6
        with:
          repository: "DimitrijevsArtjoms/RTU-sample-API-automation-2026"
          clean: false
      - uses: ./.github/actions/test

        with:
          environment: STG

  deploy-prd:
    runs-on: ubuntu-latest
    needs: test-stg
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/deploy
        with:
          environment: PRD
          port: 3030
  test-prd:
    runs-on: ubuntu-latest
    needs: deploy-prd
    steps:
      - uses: actions/checkout@v6
        with:
          repository: "DimitrijevsArtjoms/RTU-sample-API-automation-2026"
          clean: false
      - uses: ./.github/actions/test
        with:
          environment: PRD
